<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>황금도시 측량단 · GOLDEN CITY SURVEY</title>
<style>
/* =========================================================================
   황금도시 측량단 — 스타일시트
   컨셉: 측량사의 제도 책상 (청사진 + 양피지 토지증서 + 황금 인장)
   ========================================================================= */

@font-face {
    font-family: 'BinggreIi';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/Binggrae-Bold.woff') format('woff');
    font-weight: 700;
    font-display: swap;
}

:root{
  /* --- 청사진(배경) 계열 --- */
  --ink-900:#0A1018;     /* 가장 깊은 잉크 */
  --ink-800:#0E1726;     /* 메인 배경 */
  --ink-700:#142235;
  --ink-600:#1C2E45;
  --grid:rgba(120,165,215,.07);   /* 청사진 격자선 */
  --grid-bold:rgba(120,165,215,.13);

  /* --- 양피지(카드) 계열 --- */
  --paper:#ECE3CB;       /* 토지 증서 종이 */
  --paper-2:#E2D6B6;
  --paper-edge:#C9B98F;
  --paper-ink:#2C2718;   /* 종이 위 글씨 */
  --paper-ink-soft:#6B5F45;

  /* --- 강조색 --- */
  --gold:#E3B23C;        /* 귀한 순간(업적/랜드마크) */
  --gold-hi:#F6D27A;
  --gold-deep:#A87A1E;
  --eco:#6FA8DC;         /* 경제 */
  --cul:#C58BE0;         /* 문화 */
  --grn:#5FBE96;         /* 녹지 */
  --sat:#F0A35E;         /* 만족도 */
  --danger:#E0685A;      /* 경고/이벤트 */
  --ok:#5FBE96;

  --txt:#DCE6F2;         /* 청사진 위 기본 글씨 */
  --txt-dim:#8499B4;

  --r:14px;
  --shadow:0 18px 40px -12px rgba(0,0,0,.7);
  --mono:'DM Mono','SF Mono',ui-monospace,'Cascadia Mono','Roboto Mono','Courier New',monospace;
  --kr:'BinggreIi','Pretendard','Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',system-ui,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:var(--kr);
  color:var(--txt);
  background-color:var(--ink-800);
  /* 청사진 격자 */
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px),
    linear-gradient(var(--grid-bold) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-bold) 1px,transparent 1px),
    radial-gradient(ellipse at 50% -10%,rgba(60,90,130,.25),transparent 60%);
  background-size:26px 26px,26px 26px,130px 130px,130px 130px,100% 100%;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.mono{font-family:var(--mono);font-feature-settings:"tnum";}

/* ---- 앱 루트: 화면 전환 ---- */
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;
  opacity:0;transition:opacity .35s ease;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;}
.screen.active{display:flex;opacity:1;}
.wrap{width:100%;max-width:880px;margin:0 auto;padding:18px 16px 36px;}

/* ===================== 공통 버튼 ===================== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 22px;border-radius:12px;font-weight:800;font-size:15px;
  letter-spacing:.02em;transition:transform .12s ease,filter .2s ease,box-shadow .2s;
  border:1px solid transparent;user-select:none;
}
.btn:active{transform:translateY(1px) scale(.99);}
.btn-gold{background:linear-gradient(160deg,var(--gold-hi),var(--gold) 55%,var(--gold-deep));
  color:#2A1E04;box-shadow:0 8px 22px -8px rgba(227,178,60,.7),inset 0 1px 0 rgba(255,255,255,.4);}
.btn-gold:hover{filter:brightness(1.06);}
.btn-ghost{background:rgba(120,165,215,.06);border-color:rgba(120,165,215,.25);color:var(--txt);}
.btn-ghost:hover{background:rgba(120,165,215,.13);}
.btn-block{width:100%;}
.btn:disabled{opacity:.4;pointer-events:none;}

/* ===================== 타이틀 화면 ===================== */
#screen-title .wrap{min-height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;gap:10px;}
.title-eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.42em;
  color:var(--gold);text-transform:uppercase;opacity:.9;}
.title-main{font-size:clamp(40px,12vw,76px);font-weight:900;line-height:.92;
  letter-spacing:-.02em;
  background:linear-gradient(170deg,#FBE5B8,var(--gold) 45%,var(--gold-deep));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 6px 20px rgba(227,178,60,.25));}
.title-sub{font-family:var(--mono);font-size:13px;letter-spacing:.28em;
  color:var(--txt-dim);margin-top:2px;}
.title-tag{max-width:420px;color:var(--txt-dim);font-size:14px;line-height:1.6;margin:14px 0 8px;}
.title-blueprint{width:min(340px,72vw);margin:6px auto 18px;opacity:.92;}
.title-menu{display:flex;flex-direction:column;gap:10px;width:min(320px,86vw);}
.title-foot{margin-top:18px;font-size:11px;color:var(--txt-dim);font-family:var(--mono);letter-spacing:.1em;}

/* 한 줄 통계(타이틀 하단) */
.life-stats{display:flex;gap:18px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.life-stat{text-align:center;}
.life-stat b{display:block;font-family:var(--mono);font-size:20px;color:var(--gold-hi);}
.life-stat span{font-size:10px;color:var(--txt-dim);letter-spacing:.12em;}

/* ===================== 셋업(특성 선택) ===================== */
.setup-head{text-align:center;margin-bottom:18px;}
.setup-step{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--gold);}
.setup-title{font-size:26px;font-weight:900;margin-top:6px;letter-spacing:-.01em;}
.setup-desc{color:var(--txt-dim);font-size:13px;margin-top:6px;}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
@media(max-width:520px){.choice-grid{grid-template-columns:1fr;}}
.choice{
  position:relative;text-align:left;padding:16px 16px 15px;border-radius:var(--r);
  background:linear-gradient(160deg,var(--ink-700),var(--ink-600));
  border:1px solid rgba(120,165,215,.2);transition:transform .14s,border-color .2s,box-shadow .2s;
}
.choice:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 14px 30px -16px rgba(227,178,60,.5);}
.choice .ico{font-size:26px;}
.choice .nm{font-weight:800;font-size:16px;margin-top:6px;}
.choice .ds{font-size:12px;color:var(--txt-dim);margin-top:5px;line-height:1.5;min-height:32px;}
.choice .fx{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.tag{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:7px;
  background:rgba(120,165,215,.1);border:1px solid rgba(120,165,215,.18);}
.tag.up{color:var(--ok);border-color:rgba(95,190,150,.4);}
.tag.down{color:var(--danger);border-color:rgba(224,104,90,.4);}

/* ===================== 게임 HUD ===================== */
#screen-game .wrap{max-width:920px;padding-bottom:24px;}
.hud{position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,var(--ink-800) 72%,transparent);
  padding:10px 0 14px;margin:-18px 0 8px;}
.hud-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.year-box{display:flex;align-items:baseline;gap:8px;}
.year-box .lab{font-family:var(--mono);font-size:10px;letter-spacing:.24em;color:var(--txt-dim);}
.year-box .val{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--gold-hi);}
.year-box .of{font-family:var(--mono);font-size:13px;color:var(--txt-dim);}
.budget{display:flex;align-items:center;gap:7px;font-family:var(--mono);
  padding:7px 13px;border-radius:11px;background:rgba(227,178,60,.1);
  border:1px solid rgba(227,178,60,.3);}
.budget .v{font-size:18px;font-weight:700;color:var(--gold-hi);}
.budget.flash-bad{animation:flashbad .5s;}
.budget.flash-good{animation:flashgood .5s;}
@keyframes flashbad{0%,100%{background:rgba(227,178,60,.1);}40%{background:rgba(224,104,90,.4);}}
@keyframes flashgood{0%,100%{background:rgba(227,178,60,.1);}40%{background:rgba(95,190,150,.4);}}

.progress{height:6px;border-radius:6px;background:rgba(120,165,215,.13);margin-top:10px;overflow:hidden;}
.progress > i{display:block;height:100%;border-radius:6px;
  background:linear-gradient(90deg,var(--gold-deep),var(--gold-hi));transition:width .5s ease;}

/* 4대 지수 막대 */
.indices{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:11px;}
.idx{background:rgba(120,165,215,.05);border:1px solid rgba(120,165,215,.13);
  border-radius:11px;padding:8px 9px;}
.idx .ih{display:flex;justify-content:space-between;align-items:center;font-size:11px;}
.idx .ih .nm{color:var(--txt-dim);letter-spacing:.04em;}
.idx .ih .vv{font-family:var(--mono);font-weight:700;font-size:14px;}
.idx .bar{height:5px;border-radius:5px;background:rgba(255,255,255,.07);margin-top:6px;overflow:hidden;}
.idx .bar > i{display:block;height:100%;border-radius:5px;transition:width .5s;}
.idx.eco .vv,.idx.eco .nm{color:var(--eco);} .idx.eco .bar>i{background:var(--eco);}
.idx.cul .vv,.idx.cul .nm{color:var(--cul);} .idx.cul .bar>i{background:var(--cul);}
.idx.grn .vv,.idx.grn .nm{color:var(--grn);} .idx.grn .bar>i{background:var(--grn);}
.idx.sat .vv,.idx.sat .nm{color:var(--sat);} .idx.sat .bar>i{background:var(--sat);}

/* 보유 유물 줄 */
.relic-strip{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap;align-items:center;min-height:18px;}
.relic-strip .lab{font-family:var(--mono);font-size:10px;color:var(--txt-dim);letter-spacing:.2em;}
.relic-chip{font-size:17px;width:30px;height:30px;display:grid;place-items:center;
  border-radius:9px;background:rgba(227,178,60,.1);border:1px solid rgba(227,178,60,.3);cursor:help;}

/* ===================== 도시 미니맵 ===================== */
.city-panel{background:linear-gradient(160deg,var(--ink-700),var(--ink-900));
  border:1px solid rgba(120,165,215,.18);border-radius:var(--r);
  padding:12px;margin-top:6px;}
.city-panel .ph{display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--txt-dim);margin-bottom:9px;}
.city-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
.tile{aspect-ratio:1;border-radius:8px;display:grid;place-items:center;font-size:clamp(15px,5vw,22px);
  background:rgba(120,165,215,.045);border:1px dashed rgba(120,165,215,.14);
  transition:transform .3s,background .3s;}
.tile.filled{border-style:solid;border-color:rgba(227,178,60,.2);background:rgba(227,178,60,.05);}
.tile.pop{animation:tilepop .45s cubic-bezier(.2,1.5,.4,1);}
@keyframes tilepop{0%{transform:scale(0) rotate(-12deg);}100%{transform:scale(1);}}

/* ===================== 카드(턴 선택지) ===================== */
.turn-prompt{text-align:center;margin:18px 0 12px;}
.turn-prompt .ph{font-family:var(--mono);font-size:11px;letter-spacing:.26em;color:var(--gold);}
.turn-prompt h2{font-size:21px;font-weight:900;margin-top:5px;}
.turn-prompt p{color:var(--txt-dim);font-size:13px;margin-top:5px;}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
.card{
  position:relative;border-radius:var(--r);overflow:hidden;text-align:left;
  background:linear-gradient(165deg,var(--paper),var(--paper-2));
  color:var(--paper-ink);border:1px solid var(--paper-edge);
  box-shadow:var(--shadow);transition:transform .16s,box-shadow .2s;
  animation:deal .4s cubic-bezier(.2,1,.3,1) backwards;
}
.card:hover{transform:translateY(-5px) rotate(-.4deg);box-shadow:0 26px 46px -16px rgba(0,0,0,.7);}
@keyframes deal{from{transform:translateY(28px) rotate(3deg);opacity:0;}to{opacity:1;}}
.card .ribbon{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  padding:7px 12px;color:#FBF4DD;display:flex;justify-content:space-between;align-items:center;}
.card.land .ribbon{background:linear-gradient(90deg,#2C4A6E,#3A5E86);}
.card.build .ribbon{background:linear-gradient(90deg,#3E5B33,#557A45);}
.card.relic .ribbon{background:linear-gradient(90deg,var(--gold-deep),var(--gold));color:#2A1E04;}
.card-body{padding:13px 14px 15px;}
.card .ttl{font-weight:900;font-size:17px;letter-spacing:-.01em;}
.card .meta{font-size:12px;color:var(--paper-ink-soft);margin-top:3px;min-height:16px;}
.blueprint-slot{margin:11px 0;background:#0E2238;border-radius:10px;padding:8px;
  border:1px solid #224366;}
.blueprint-slot svg{display:block;width:100%;height:auto;}
.statline{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;
  padding:3px 0;border-bottom:1px dashed rgba(44,39,24,.18);}
.statline:last-child{border-bottom:none;}
.statline .k{color:var(--paper-ink-soft);}
.statline .v{font-weight:700;}
.statline .v.hidden{color:#9C7B3A;letter-spacing:.1em;}
.card-cta{margin-top:11px;width:100%;padding:11px;border-radius:10px;font-weight:800;font-size:14px;
  background:linear-gradient(160deg,var(--ink-700),var(--ink-600));color:#EAF1FA;
  border:1px solid rgba(120,165,215,.25);transition:filter .2s;}
.card-cta:hover{filter:brightness(1.18);}
.card.relic .card-cta{background:linear-gradient(160deg,var(--gold),var(--gold-deep));color:#2A1E04;}

.fx-mini{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
.fx-mini span{font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:6px;font-weight:700;}
.fx-eco{background:rgba(111,168,220,.18);color:#1C4E7A;}
.fx-cul{background:rgba(197,139,224,.2);color:#6B3A86;}
.fx-grn{background:rgba(95,190,150,.2);color:#236B4A;}
.fx-sat{background:rgba(240,163,94,.22);color:#8A4E14;}
.fx-neg{background:rgba(224,104,90,.18);color:#8A2C20;}

.turn-foot{display:flex;gap:10px;margin-top:16px;}

/* ===================== 모달(계산/이벤트) ===================== */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(8,12,20,.78);
  backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:18px;}
.overlay.show{display:flex;animation:fade .25s;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.modal{width:100%;max-width:440px;border-radius:18px;overflow:hidden;
  background:linear-gradient(170deg,var(--paper),var(--paper-2));color:var(--paper-ink);
  box-shadow:0 30px 70px -10px rgba(0,0,0,.8);animation:rise .3s cubic-bezier(.2,1,.3,1);}
@keyframes rise{from{transform:translateY(30px) scale(.96);opacity:0;}to{transform:none;opacity:1;}}
.modal-head{padding:13px 18px;font-family:var(--mono);font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;color:#FBF4DD;background:linear-gradient(90deg,#2C4A6E,#3A5E86);
  display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:18px;}
.modal-body h3{font-size:19px;font-weight:900;}
.q-shape{margin:14px 0;background:#0E2238;border-radius:12px;padding:14px;border:1px solid #224366;}
.q-shape svg{display:block;width:100%;height:auto;max-height:230px;}
.q-text{font-size:15px;line-height:1.6;text-align:center;font-weight:700;}
.q-text .hl{color:var(--gold-deep);font-family:var(--mono);}
.answer-row{display:flex;gap:10px;align-items:stretch;margin-top:6px;}
.answer-row input{flex:1;font-family:var(--mono);font-size:22px;font-weight:700;text-align:center;
  padding:13px;border-radius:12px;background:#FFFDF5;border:2px solid var(--paper-edge);
  color:var(--paper-ink);outline:none;-moz-appearance:textfield;}
.answer-row input::-webkit-outer-spin-button,.answer-row input::-webkit-inner-spin-button{-webkit-appearance:none;}
.answer-row input:focus{border-color:var(--gold);}
.unit-suffix{display:grid;place-items:center;font-family:var(--mono);font-weight:800;
  padding:0 14px;border-radius:12px;background:rgba(44,39,24,.08);font-size:15px;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.keypad button{padding:14px;border-radius:11px;font-family:var(--mono);font-size:19px;font-weight:700;
  background:#FFFDF5;border:1px solid var(--paper-edge);color:var(--paper-ink);transition:filter .12s;}
.keypad button:active{filter:brightness(.9);}
.keypad button.act{background:linear-gradient(160deg,var(--gold),var(--gold-deep));color:#2A1E04;border:none;}
.q-hint{margin-top:12px;font-size:12px;color:var(--paper-ink-soft);text-align:center;line-height:1.5;}
.q-feedback{margin-top:12px;padding:12px;border-radius:11px;font-weight:700;text-align:center;display:none;}
.q-feedback.ok{display:block;background:rgba(95,190,150,.2);color:#236B4A;border:1px solid rgba(95,190,150,.5);}
.q-feedback.no{display:block;background:rgba(224,104,90,.18);color:#8A2C20;border:1px solid rgba(224,104,90,.5);}

/* 이벤트 모달 선택지 */
.event-choices{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.event-choice{text-align:left;padding:13px 15px;border-radius:12px;background:#FFFDF5;
  border:1px solid var(--paper-edge);transition:transform .12s,border-color .2s;}
.event-choice:hover{transform:translateX(3px);border-color:var(--gold);}
.event-choice .ec-t{font-weight:800;font-size:14px;}
.event-choice .ec-d{font-size:12px;color:var(--paper-ink-soft);margin-top:3px;}

/* ===================== 토스트 / 해금 연출 ===================== */
#toasts{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:80;
  display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:max-content;max-width:92vw;}
.toast{font-size:13px;font-weight:700;padding:10px 16px;border-radius:11px;
  background:var(--ink-700);border:1px solid rgba(120,165,215,.3);color:var(--txt);
  box-shadow:var(--shadow);animation:toastin .35s,toastout .35s 2.4s forwards;}
.toast.gold{background:linear-gradient(160deg,var(--gold),var(--gold-deep));color:#2A1E04;border:none;}
.toast.grn{border-color:rgba(95,190,150,.5);} .toast.bad{border-color:rgba(224,104,90,.5);}
@keyframes toastin{from{transform:translateY(-16px);opacity:0;}}
@keyframes toastout{to{transform:translateY(-16px);opacity:0;}}

/* 업적/특구 해금 풀스크린 플래시 */
.unlock-pop{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;
  background:rgba(8,12,20,.6);backdrop-filter:blur(3px);}
.unlock-pop.show{display:flex;animation:fade .3s;}
.unlock-card{text-align:center;padding:30px 36px;border-radius:20px;
  background:linear-gradient(165deg,var(--ink-700),var(--ink-900));
  border:1px solid var(--gold);box-shadow:0 0 60px -10px rgba(227,178,60,.5);
  animation:rise .4s cubic-bezier(.2,1.4,.4,1);max-width:340px;}
.unlock-card .uk-kind{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--gold);}
.unlock-card .uk-ico{font-size:54px;margin:10px 0;filter:drop-shadow(0 4px 14px rgba(227,178,60,.5));}
.unlock-card .uk-nm{font-size:22px;font-weight:900;}
.unlock-card .uk-ds{font-size:13px;color:var(--txt-dim);margin-top:8px;line-height:1.5;}

/* ===================== 결과 화면 ===================== */
#screen-result .wrap{padding-top:30px;}
.ending-hero{text-align:center;padding:26px 18px;border-radius:20px;margin-bottom:18px;
  background:linear-gradient(165deg,var(--ink-700),var(--ink-900));
  border:1px solid rgba(227,178,60,.3);}
.ending-hero .grade{font-family:var(--mono);font-size:64px;font-weight:800;line-height:1;
  background:linear-gradient(170deg,var(--gold-hi),var(--gold-deep));
  -webkit-background-clip:text;background-clip:text;color:transparent;}

/* =========================================================================
 *  [3] 유틸 & 수학 엔진 (도형 도면 SVG + 측량 문제 생성)
 *  핵심 설계:
 *   - 넓이(area) 부지  : 넓이를 계산 → 부지의 "개발 규모" = 건물 효과 배수가 결정됨 (넓을수록 강함)
 *   - 둘레(perimeter)부지: 둘레를 계산 → 부지의 "유지비"가 결정됨 (둘레 길수록 매년 손해)
 *   - 단위(unit) 부지   : ㎠↔㎡ 변환을 풀어야 진짜 규모를 알 수 있음
 *  => 계산은 점수가 아니라 "투자 판단 정보"가 된다.
 * ========================================================================= */

/* ---- 기본 유틸 ---- */
const rnd  = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const shuffle = arr => { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const $  = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

/* ---- 청사진 도면 스타일 ---- */
const BP = { fig:'#7FB0E0', fill:'rgba(127,176,224,.15)', dim:'#9FBFE0', lbl:'#E6F0FB' };
const VBW = 300, VBH = 200;          // 도면 viewBox
const wrapSvg = inner => `<svg viewBox="0 0 ${VBW} ${VBH}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
const T = (x, y, s, anchor='middle', size=14) =>
  `<text x="${x}" y="${y}" fill="${BP.lbl}" font-family="ui-monospace,monospace" font-size="${size}" font-weight="700" text-anchor="${anchor}" dominant-baseline="middle">${s}</text>`;
const fitScale = (natW, natH, maxW=150, maxH=104) => Math.min(maxW / natW, maxH / natH);
const cx = VBW / 2, cy = VBH / 2 + 6;

/* ---- 각 도형의 도면 생성기 (좌표는 viewBox 기준으로 중앙 배치) ---- */
const SHAPE = {
  // 직사각형: 넓이 또는 둘레용
  rect(w, h){ const s = fitScale(w, h); const W = w*s, H = h*s, x = cx - W/2, y = cy - H/2;
    return { svg:
      `<rect x="${x}" y="${y}" width="${W}" height="${H}" fill="${BP.fill}" stroke="${BP.fig}" stroke-width="2.5"/>`
      + T(cx, y - 14, `${w} m`) + `<line x1="${x}" y1="${y-6}" x2="${x+W}" y2="${y-6}" stroke="${BP.dim}" stroke-dasharray="4 3"/>`
      + T(x - 18, cy, `${h} m`, 'middle') + `<line x1="${x-6}" y1="${y}" x2="${x-6}" y2="${y+H}" stroke="${BP.dim}" stroke-dasharray="4 3"/>`
    }; },
  square(sd){ return SHAPE.rect(sd, sd); },
  // 평행사변형
  para(b, h){ const s = fitScale(b + b*0.35, h); const B = b*s, H = h*s, off = B*0.28;
    const x = cx - (B+off)/2, y = cy - H/2;
    const pts = `${x+off},${y} ${x+off+B},${y} ${x+B},${y+H} ${x},${y+H}`;
    return { svg:
      `<polygon points="${pts}" fill="${BP.fill}" stroke="${BP.fig}" stroke-width="2.5"/>`
      // 밑변
      + `<line x1="${x}" y1="${y+H+8}" x2="${x+B}" y2="${y+H+8}" stroke="${BP.dim}" stroke-dasharray="4 3"/>` + T((x+x+B)/2, y+H+20, `밑변 ${b} m`)
      // 높이(수직 점선)
      + `<line x1="${x+off}" y1="${y}" x2="${x+off}" y2="${y+H}" stroke="${BP.dim}" stroke-dasharray="4 3"/>`
      + `<rect x="${x+off}" y="${y+H-9}" width="9" height="9" fill="none" stroke="${BP.dim}"/>`
      + T(x+off-26, cy, `높이`, 'middle', 12) + T(x+off-26, cy+14, `${h} m`, 'middle', 12)
    }; },
  // 삼각형 (넓이): 밑변 + 높이
  triArea(b, h){ const s = fitScale(b, h); const B = b*s, H = h*s;
    const x = cx - B/2, baseY = cy + H/2, apexX = cx - B*0.12, apexY = cy - H/2;
    return { svg:
      `<polygon points="${apexX},${apexY} ${x+B},${baseY} ${x},${baseY}" fill="${BP.fill}" stroke="${BP.fig}" stroke-width="2.5"/>`
      + `<line x1="${x}" y1="${baseY+8}" x2="${x+B}" y2="${baseY+8}" stroke="${BP.dim}" stroke-dasharray="4 3"/>` + T(cx, baseY+20, `밑변 ${b} m`)
      + `<line x1="${apexX}" y1="${apexY}" x2="${apexX}" y2="${baseY}" stroke="${BP.dim}" stroke-dasharray="4 3"/>`
      + `<rect x="${apexX}" y="${baseY-9}" width="9" height="9" fill="none" stroke="${BP.dim}"/>`
      + T(apexX-24, (apexY+baseY)/2, `높이`,'middle',12) + T(apexX-24,(apexY+baseY)/2+14,`${h} m`,'middle',12)
    }; },
  // 사다리꼴: 윗변/아랫변/높이
  trap(top, bot, h){ const s = fitScale(bot, h); const Tp = top*s, Bt = bot*s, H = h*s;
    const by = cy + H/2, ty = cy - H/2, bx = cx - Bt/2, txc = cx - Tp/2;
    return { svg:
      `<polygon points="${txc},${ty} ${txc+Tp},${ty} ${bx+Bt},${by} ${bx},${by}" fill="${BP.fill}" stroke="${BP.fig}" stroke-width="2.5"/>`
      + `<line x1="${txc}" y1="${ty-8}" x2="${txc+Tp}" y2="${ty-8}" stroke="${BP.dim}" stroke-dasharray="4 3"/>` + T(cx, ty-18, `윗변 ${top} m`,'middle',12)
      + `<line x1="${bx}" y1="${by+8}" x2="${bx+Bt}" y2="${by+8}" stroke="${BP.dim}" stroke-dasharray="4 3"/>` + T(cx, by+20, `아랫변 ${bot} m`,'middle',12)
      + `<line x1="${bx-6}" y1="${ty}" x2="${bx-6}" y2="${by}" stroke="${BP.dim}" stroke-dasharray="4 3"/>`
      + T(bx-22, cy, `높이`,'middle',12) + T(bx-22, cy+14, `${h} m`,'middle',12)
    }; },
  // 마름모: 대각선 두 개
  rhombus(d1, d2){ const s = fitScale(d1, d2); const A = d1*s/2, B = d2*s/2;
    return { svg:
      `<polygon points="${cx},${cy-B} ${cx+A},${cy} ${cx},${cy+B} ${cx-A},${cy}" fill="${BP.fill}" stroke="${BP.fig}" stroke-width="2.5"/>`
      + `<line x1="${cx-A}" y1="${cy}" x2="${cx+A}" y2="${cy}" stroke="${BP.dim}" stroke-dasharray="4 3"/>`
      + `<line x1="${cx}" y1="${cy-B}" x2="${cx}" y2="${cy+B}" stroke="${BP.dim}" stroke-dasharray="4 3"/>`
      + T(cx+A+4, cy-12, `${d1} m`,'start',12) + T(cx+10, cy-B+2, `${d2} m`,'start',12)
    }; },
  // 삼각형(둘레): 세 변
  triPeri(a, b, c){ const s = fitScale(c, c*0.7); const C = c*s;
    const x = cx - C/2, baseY = cy + C*0.32, apexX = cx - C*0.05, apexY = cy - C*0.33;
    return { svg:
      `<polygon points="${apexX},${apexY} ${x+C},${baseY} ${x},${baseY}" fill="${BP.fill}" stroke="${BP.fig}" stroke-width="2.5"/>`
      + T(cx, baseY+18, `${c} m`) + T((x+apexX)/2-16, (baseY+apexY)/2, `${a} m`,'end',12) + T((x+C+apexX)/2+16, (baseY+apexY)/2, `${b} m`,'start',12)
    }; },
  // 정다각형(둘레): n개의 같은 변
  regular(n, side){ const R = 58, pts = [];
    for (let i = 0; i < n; i++){ const ang = -Math.PI/2 + i*2*Math.PI/n; pts.push(`${cx + R*Math.cos(ang)},${cy + R*Math.sin(ang)}`); }
    return { svg:
      `<polygon points="${pts.join(' ')}" fill="${BP.fill}" stroke="${BP.fig}" stroke-width="2.5"/>`
      + T(cx, cy, `정${n}각형`,'middle',13) + T(cx, cy + R + 18, `한 변 ${side} m`)
    }; },
  // ㄱ자(L)형 부지(둘레): 6변
  lshape(a, b, c, d){ // 외곽 가로 a, 세로 b, 안쪽 가로 c, 세로 d
    const s = fitScale(a, b, 130, 96); const A=a*s,B=b*s,C=c*s,D=d*s;
    const x = cx - A/2, y = cy - B/2;
    const pts = `${x},${y} ${x+A},${y} ${x+A},${y+D} ${x+C},${y+D} ${x+C},${y+B} ${x},${y+B}`;
    return { svg:
      `<polygon points="${pts}" fill="${BP.fill}" stroke="${BP.fig}" stroke-width="2.5"/>`
      + T(x+A/2, y-12, `${a} m`,'middle',12) + T(x-14, y+B/2, `${b} m`,'middle',12)
      + T(x+A+14, y+D/2, `${d} m`,'start',12) + T(x+C/2, y+B+14, `${c} m`,'middle',12)
    }; },
};

/* ---- 측량 문제(부지) 생성 ----
 *  반환: { kind, sub, svg, prompt, answer, unit, formula, area, peri, sizeFactor, upkeep, name }
 *  kind: 'area' | 'perimeter' | 'unit'
 */
/* 땅 이름은 '실제 도형'에서 생성하여 (분류 · 이름 · 도면)이 항상 일치하게 한다 */
const PLOT_FLAVOR = ['강변','호숫가','중앙','언덕','남부','북부','외곽','역세권','신항','구도심','대로변','공원 옆','햇살','전망 좋은','노을'];
const SHAPE_WORD = { '삼각형':'삼각','평행사변형':'평행사변','사다리꼴':'사다리꼴','마름모':'마름모','직사각형':'직사각','정사각형':'정사각','정오각형':'오각','정육각형':'육각','ㄱ자형':'ㄱ자' };
function shapeName(sub){ return `${pick(PLOT_FLAVOR)} ${SHAPE_WORD[sub] || ''} 부지`; }
const UNIT_NAMES = ['옛 등기 부지','㎠ 표기 부지','오래된 등기 부지','등기 갱신 부지'];

/* 단위 변환 부지용 도면: 치수를 적지 않은 '등기 도면'(문제 숫자와 충돌 방지) */
function unitDeedSVG(srcUnit){
  const x = cx - 72, y = cy - 52, w = 144, h = 104;
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="7" fill="${BP.fill}" stroke="${BP.fig}" stroke-width="2.5"/>`
    + `<line x1="${x+16}" y1="${y+30}" x2="${x+w-16}" y2="${y+30}" stroke="${BP.dim}" stroke-dasharray="5 4"/>`
    + `<line x1="${x+16}" y1="${y+46}" x2="${x+w-34}" y2="${y+46}" stroke="${BP.dim}" stroke-dasharray="5 4"/>`
    + `<circle cx="${x+w-34}" cy="${y+h-30}" r="21" fill="none" stroke="${BP.fig}" stroke-width="2"/>`
    + T(x+w-34, y+h-30, srcUnit, 'middle', 14)
    + T(cx, y-13, '토지 등기 도면', 'middle', 12);
}

function makeAreaPlot(){
  const t = pick(['triangle','para','trap','rhombus','rect','square']);
  let svg, prompt, answer, formula, sub, shapeKey = t;
  if (t === 'triangle'){ let b = rnd(6,20), h = rnd(4,16); if ((b*h) % 2) b++; svg = SHAPE.triArea(b,h).svg;
    answer = b*h/2; prompt = `삼각형 부지의 넓이는?`; formula = `밑변 × 높이 ÷ 2 = ${b} × ${h} ÷ 2`; sub='삼각형'; }
  else if (t === 'para'){ let b = rnd(6,18), h = rnd(4,14); svg = SHAPE.para(b,h).svg;
    answer = b*h; prompt = `평행사변형 부지의 넓이는?`; formula = `밑변 × 높이 = ${b} × ${h}`; sub='평행사변형'; }
  else if (t === 'trap'){ let a = rnd(5,13), b = a + rnd(2,10), h = rnd(4,12); if (((a+b)*h)%2) h = (h%2? h+1 : h); if (((a+b)*h)%2) b++; svg = SHAPE.trap(a,b,h).svg;
    answer = (a+b)*h/2; prompt = `사다리꼴 부지의 넓이는?`; formula = `(윗변 + 아랫변) × 높이 ÷ 2 = (${a} + ${b}) × ${h} ÷ 2`; sub='사다리꼴'; }
  else if (t === 'rhombus'){ let d1 = rnd(6,20), d2 = rnd(6,20); if ((d1*d2)%2) d1++; svg = SHAPE.rhombus(d1,d2).svg;
    answer = d1*d2/2; prompt = `마름모 부지의 넓이는?`; formula = `대각선 × 대각선 ÷ 2 = ${d1} × ${d2} ÷ 2`; sub='마름모'; }
  else if (t === 'rect'){ let w = rnd(5,18), h = rnd(4,14); svg = SHAPE.rect(w,h).svg;
    answer = w*h; prompt = `직사각형 부지의 넓이는?`; formula = `가로 × 세로 = ${w} × ${h}`; sub='직사각형'; }
  else { let sd = rnd(4,14); svg = SHAPE.square(sd).svg;
    answer = sd*sd; prompt = `정사각형 부지의 넓이는?`; formula = `한 변 × 한 변 = ${sd} × ${sd}`; sub='정사각형'; }
  const area = answer;
  return { kind:'area', sub, shapeKey, svg, prompt, answer, unit:'㎡', formula,
    area, peri: Math.round(Math.sqrt(area)*3.6), name: shapeName(sub) };
}

function makePerimeterPlot(){
  const t = pick(['rect','square','tri','penta','hexa','lshape']);
  let svg, answer, formula, sub;
  if (t === 'rect'){ const w = rnd(5,18), h = rnd(4,14); svg = SHAPE.rect(w,h).svg;
    answer = 2*(w+h); formula = `(가로 + 세로) × 2 = (${w} + ${h}) × 2`; sub='직사각형'; }
  else if (t === 'square'){ const s = rnd(4,15); svg = SHAPE.square(s).svg;
    answer = 4*s; formula = `한 변 × 4 = ${s} × 4`; sub='정사각형'; }
  else if (t === 'tri'){ const a = rnd(6,14), b = rnd(6,14), c = rnd(Math.max(a,b)-3, a+b-2); svg = SHAPE.triPeri(a,b,c).svg;
    answer = a+b+c; formula = `세 변의 합 = ${a} + ${b} + ${c}`; sub='삼각형'; }
  else if (t === 'penta'){ const s = rnd(4,12); svg = SHAPE.regular(5,s).svg;
    answer = 5*s; formula = `한 변 × 5 = ${s} × 5`; sub='정오각형'; }
  else if (t === 'hexa'){ const s = rnd(4,11); svg = SHAPE.regular(6,s).svg;
    answer = 6*s; formula = `한 변 × 6 = ${s} × 6`; sub='정육각형'; }
  else { const a = rnd(10,16), b = rnd(8,14), c = rnd(4, a-3), d = rnd(3, b-3); svg = SHAPE.lshape(a,b,c,d).svg;
    answer = a + b + c + d + (a-c) + (b-d); formula = `여섯 변을 모두 더하면`; sub='ㄱ자형'; }
  const peri = answer;
  return { kind:'perimeter', sub, shapeKey:t, svg, prompt:`이 부지의 둘레는?`, answer, unit:'m', formula,
    area: rnd(60,90), peri, name: shapeName(sub) };
}

function makeUnitPlot(){
  const dir = Math.random() < 0.62 ? 'c2m' : 'm2c';
  let prompt, answer, unit, formula, sub, realArea, svg;
  if (dir === 'c2m'){ realArea = rnd(20,170); const cm2 = realArea * 10000;
    prompt = `등기부에 ${cm2.toLocaleString()} ㎠ 로 적혀 있다. ㎡로 고치면?`;
    answer = realArea; unit='㎡'; formula = `1 ㎡ = 10000 ㎠ → ${cm2.toLocaleString()} ÷ 10000`; sub='㎠ → ㎡';
    svg = unitDeedSVG('㎠'); }
  else { realArea = rnd(2,9);
    prompt = `등기부에 ${realArea} ㎡ 로 적혀 있다. ㎠로 고치면?`;
    answer = realArea * 10000; unit='㎠'; formula = `1 ㎡ = 10000 ㎠ → ${realArea} × 10000`; sub='㎡ → ㎠';
    svg = unitDeedSVG('㎡'); }
  return { kind:'unit', sub, shapeKey:'deed', svg, prompt, answer, unit, formula,
    area: realArea, peri: Math.round(Math.sqrt(realArea)*3.6), name: pick(UNIT_NAMES) };
}

/* 부지 1개 생성 (종류 가중치) */
function generatePlot(){
  const r = Math.random();
  let p;
  if (r < 0.60) p = makeAreaPlot();
  else if (r < 0.86) p = makePerimeterPlot();
  else p = makeUnitPlot();
  // 개발 규모(건물 효과 배수) & 유지비 산출
  p.sizeFactor = clamp(0.6 + p.area / 140, 0.6, 1.75);
  p.upkeep = +(p.peri * CFG.UPKEEP_RATE).toFixed(1);
  return p;
}

function load(){ try { return Object.assign(defaultSave(), JSON.parse(localStorage.getItem(SAVE_KEY)) || {}); }
  catch(e){ return defaultSave(); } }

const has = id => G.relics.includes(id);   // 유물 보유 여부 단축

let G = null;

    stats:{ correct:0, wrong:0, total:0, streak:0, maxStreak:0,

function addIndex(k, v){ G.idx[k] = clamp(G.idx[k] + v, 0, 100); }
function applyFx(fx, festivalBoost=true){
  for (const k in fx){
    if (k === 'budget'){ G.budget = Math.max(0, G.budget + fx.budget); continue; }
    let v = fx[k];
    if (festivalBoost && k === 'sat' && v > 0 && has('festival')) v = Math.round(v * 1.5);
    addIndex(k, v);
  }
}

/* ---- 측량 계산 모달 ---- */
let calcCtx = null;
function openSurvey(plot){
  calcCtx = { plot, t0: Date.now() };
  $('#calcHeadLabel').textContent = plot.kind === 'unit' ? '단위 변환' : (plot.kind === 'perimeter' ? '둘레 측량' : '넓이 측량');
  $('#calcHeadRight').textContent = plot.name;
  $('#calcTitle').textContent = plot.name;
  $('#calcShape').innerHTML = wrapSvg(plot.svg);
  $('#calcText').innerHTML = plot.prompt;
  $('#calcUnit').textContent = plot.unit;
  $('#calcInput').value = '';
  $('#calcHint').textContent = `공식: ${plot.formula}`;
  $('#calcFeedback').className = 'q-feedback';
  $('#calcSubmit').textContent = '확인';
  $('#calcSubmit').onclick = submitSurvey;
  showOverlay('overlayCalc');
  setTimeout(() => $('#calcInput').focus(), 100);
}
function submitSurvey(){
  const plot = calcCtx.plot;
  const raw = $('#calcInput').value.trim();
  if (raw === '') { $('#calcInput').focus(); return; }
  const val = Number(raw);
  let correct = val === plot.answer;
  const fb = $('#calcFeedback');

  // 단위 변환기 유물: 단위 문제 자동 정답
  if (!correct && plot.kind === 'unit' && has('unitMaster')) correct = true;
  // 스마트 측정기: 첫 오답 1회 무효
  let saved = false;
  if (!correct && has('smartMeter') && !G.flags.smartCharge){ correct = true; saved = true; G.flags.smartCharge = true; }

  G.stats.total++;
  G.stats.totalTime += (Date.now() - calcCtx.t0) / 1000;

  if (correct){
    G.stats.correct++;
    G.stats.streak += has('banner') ? 2 : 1;
    G.stats.maxStreak = Math.max(G.stats.maxStreak, G.stats.streak);
    if (plot.kind === 'area') G.stats.kArea++;
    else if (plot.kind === 'perimeter') G.stats.kPeri++;
    else G.stats.kUnit++;
    if (plot.sub === '삼각형') G.stats.sTriangle++;
    if (plot.sub === '평행사변형') G.stats.sParallelogram++;
    if (plot.sub === '사다리꼴') G.stats.sTrapezoid++;
    if (plot.sub === '마름모') G.stats.sRhombus++;

    plot.surveyed = true; plot.correct = true;
    plot.precision = CFG.PRECISION_BONUS + (G.mayor.planner ? 0.10 : 0) + (has('tape') ? 0.10 : 0);
    if (has('license')) addIndex('sat', 1);
    if (has('goldenRuler') && plot.kind === 'area'){ G.budget += 3; }
    if (has('compass') && plot.kind === 'perimeter') plot.upkeepMult = 0.7;

    fb.className = 'q-feedback ok';
    fb.textContent = saved ? `정답! (스마트 측정기가 도와줬어요) 정밀 측량 보너스 +${Math.round(plot.precision*100)}%`
                           : `정답! 정밀 측량 성공 — 건물 효과 +${Math.round(plot.precision*100)}%`;
  } else {
    G.stats.wrong++; G.stats.streak = 0;
    plot.surveyed = true; plot.correct = false; plot.precision = 0;
    fb.className = 'q-feedback no';
    fb.textContent = `아쉬워요. 정답은 ${plot.answer.toLocaleString()} ${plot.unit}. 그래도 대략적인 정보로 개발할 수 있어요.`;
  }
  $('#calcSubmit').textContent = '닫기';
  $('#calcSubmit').onclick = () => { hideOverlay('overlayCalc'); renderPlots(); evalAchievements(buildS(false)); };
  renderHud();
}

/* 건물 효과 계산(부지 규모·정밀보너스·지형·유물 반영) */
function computeBuild(plot, b){
  let m = plot.sizeFactor * (1 + (plot.precision || 0));
  const C = G.city.mod, cat = b.cat;
  if ((cat === 'park' || cat === 'garden') && C.parkBonus) m *= 1 + C.parkBonus;
  if (cat === 'harbor' && C.harborBonus) m *= 1 + C.harborBonus;
  if ((cat === 'lab' || cat === 'complex') && C.techBonus) m *= 1 + C.techBonus;
  if (C.bigLandBonus && plot.area > 120) m *= 1.3;
  if (has('whitePaper') && ['library','museum','gallery','culture'].includes(cat)) m *= 1.6;
  if (has('greenBudget') && (cat === 'park' || cat === 'garden')) m *= 1.6;
  if (has('heritage') && (cat === 'museum' || cat === 'gallery')) m *= 1.5;
  if (has('archive') && cat === 'library') m *= 1.6;
  if (has('square') && (plot.shapeKey === 'rect' || plot.shapeKey === 'square')) m *= 1.3;
  if (has('triangle') && (plot.shapeKey === 'triangle' || plot.shapeKey === 'tri')) m *= 1.35;
  if (has('rhombus') && plot.shapeKey === 'rhombus') m *= 1.45;
  const eff = { eco:0, cul:0, grn:0, sat:0 };
  for (const k of INDEX_KEYS){
    let v = b.base[k] || 0; if (!v) continue;
    let mm = m;
    if (k === 'eco' && C.ecoBuildBonus && v > 0) mm *= 1 + C.ecoBuildBonus;
    if (k === 'cul' && C.culBuildBonus && v > 0) mm *= 1 + C.culBuildBonus;
    if (k === 'grn' && C.grnBonus && v > 0) mm *= 1 + C.grnBonus;
    if (k === 'sat' && C.satBonus && v > 0) mm *= 1 + C.satBonus;
    if (k === 'sat' && has('magnet')) mm *= 1.35;
    eff[k] = Math.round(v * mm * 0.5);
  }
  if (cat === 'power' && has('solar')){ eff.grn = Math.max(0, eff.grn); eff.eco += 4; }
  return eff;
}
function buildCost(b){
  let mult = 1 - (has('stamp') ? 0.2 : 0) - (has('quarry') ? 0.1 : 0);
  return Math.max(1, Math.round(b.cost * mult));
}
function buildUpkeep(plot, b){
  const C = G.city.mod;
  let u = plot.upkeep * b.up * (1 + (C.upkeepMul || 0)) * (plot.upkeepMult || 1);
  if (has('cleanTech')) u *= 0.82;
  if (has('quarry')) u *= 0.9;
  return +clamp(u, 0.4, 4.5).toFixed(1);
}

function develop(plot, b){
  const cost = buildCost(b);
  if (G.budget < cost) return;
  G.budget -= cost; G.stats.spent += cost;
  if (has('patron') && ['library','museum','gallery','culture'].includes(b.cat)) G.budget += Math.round(cost * 0.3);

  const eff = computeBuild(plot, b);
  INDEX_KEYS.forEach(k => { addIndex(k, eff[k]); if (eff[k] > 0) G.stats.valueGained += eff[k]; });
  const upkeep = buildUpkeep(plot, b);

  G.buildings.push({ id: b.id, nm: b.nm, ico: b.ico, cat: b.cat, eff, upkeep });
  G.catCount[b.cat] = (G.catCount[b.cat] || 0) + 1;
  placeTile(b.ico);
  if (b.special){ G.flags.builtGoldTower = true; G.flags.hiddenLandmark = true; toast('숨겨진 랜드마크 「황금 탑」 완공!', 'gold'); }

  checkDistricts();
  flashBudget('bad');
  renderHud(); renderCity();
  evalAchievements(buildS(false));
  resolveEndOfYear();
}

/* ---- 특구 완성 검사 ---- */
function checkDistricts(){
  for (const d of DISTRICTS){
    if (G.districts.includes(d.id)) continue;
    const ok = Object.entries(d.req).every(([cat, n]) => (G.catCount[cat] || 0) >= n);
    if (ok){
      G.districts.push(d.id);
      let bonus = Object.assign({}, d.bonus);
      const mult = (has('masterPlan') ? 1.6 : 1) * 0.45;
      INDEX_KEYS.forEach(k => { if (bonus[k]) addIndex(k, Math.round(bonus[k] * mult)); });
      const sv = load(); sv.districts[d.id] = true; save(sv);
      queueUnlock('특구 완성', d.ico, d.nm, d.ds);
    }
  }
}

/* ---- 한 해 마무리: 수입/유지비/이벤트 ---- */
function resolveEndOfYear(){
  // 수입
  let income = CFG.BASE_INCOME + Math.floor(G.idx.eco / CFG.ECO_INCOME_DIV) + Math.floor(G.idx.sat / 10) + Math.floor(G.idx.cul / 12);
  if (has('taxLedger')) income += 3;
  if (has('ecoCharter') && G.idx.grn >= 50) income += 2;
  if (has('goldVein') && G.stats.wrong === 0){ G.flags.goldVeinLvl++; income += G.flags.goldVeinLvl; }
  // 유지비
  const upkeep = G.buildings.reduce((s, b) => s + b.upkeep, 0);
  const net = income - upkeep;
  G.budget = Math.max(0, G.budget + net);
  if (net < 0 && G.budget === 0) addIndex('sat', -2);
  if (has('citizen') && G.idx.sat >= 60) INDEX_KEYS.forEach(k => addIndex(k, 1));
  if (net !== 0) toast(`결산: 수입 ${income} − 유지비 ${upkeep.toFixed(1)} = ${net >= 0 ? '+' : ''}${net.toFixed(1)}`, net >= 0 ? 'grn' : 'bad');
  if (net >= 0) flashBudget('good');
  renderHud();

  // 이벤트(중간 해에만 확률 발생)
  if (G.year >= 2 && G.year <= CFG.TOTAL_YEARS - 1 && Math.random() < CFG.EVENT_CHANCE){
    showEvent(pick(EVENTS));
  } else {
    advanceYear();
  }
}

/* ---- 이벤트 모달 ---- */
function showEvent(ev){
  $('#evTitle').textContent = ev.t;
  $('#evDesc').textContent = ev.d;
  const box = $('#evChoices'); box.innerHTML = '';
  ev.c.forEach(ch => {
    const el = document.createElement('button');
    el.className = 'event-choice';
    el.innerHTML = `<div class="ec-t">${ch.t}</div><div class="ec-d">${ch.d}</div>`;
    el.onclick = () => { applyFx(ch.fx); hideOverlay('overlayEvent'); renderHud(); evalAchievements(buildS(false)); advanceYear(); };
    box.appendChild(el);
  });
  showOverlay('overlayEvent');
}

/* ---- 통계 객체 S 구성 (업적·엔딩 판정 입력) ---- */
function buildS(ended){
  const sv = load(), idx = G.idx, cats = {};
  G.buildings.forEach(b => cats[b.cat] = (cats[b.cat] || 0) + 1);
  const total = G.stats.total, correct = G.stats.correct, wrong = G.stats.wrong;
  const accuracy = total ? Math.round(correct / total * 100) : 0;
  const invEff = clamp(Math.round(G.stats.valueGained / Math.max(G.stats.spent, 1) * 48), 0, 100);
  const distList = G.districts.slice();
  const score = Math.round((idx.eco + idx.cul + idx.grn + idx.sat) * 0.6)
    + distList.length * 7 + Math.round(accuracy / 100 * 90) + Math.round(invEff / 100 * 60)
    + G.relics.length * 3 + (G.flags.hiddenLandmark ? 40 : 0);
  return {
    ended, year:G.year, budget:Math.round(G.budget),
    eco:idx.eco, cul:idx.cul, grn:idx.grn, sat:idx.sat,
    correct, wrong, total, accuracy, maxStreak:G.stats.maxStreak,
    kArea:G.stats.kArea, kPeri:G.stats.kPeri, kUnit:G.stats.kUnit,
    sTriangle:G.stats.sTriangle, sParallelogram:G.stats.sParallelogram,
    sTrapezoid:G.stats.sTrapezoid, sRhombus:G.stats.sRhombus,
    districts:distList.length, distList, relics:G.relics.length, built:G.buildings.length,
    landmarks:cats.landmark || 0, cats, invEff, score, grade:'', endingId:'',
    hiddenLandmark:G.flags.hiddenLandmark,
    gamesPlayed:sv.gamesPlayed || 0,
    relicsEver:Object.keys(sv.relics || {}).length,
    districtsEver:Object.keys(sv.districts || {}).length,
    endingsEver:Object.keys(sv.endings || {}).length,
    cityTraitsPlayed:Object.keys(sv.cityTraitsPlayed || {}).length,
    mayorTraitsPlayed:Object.keys(sv.mayorTraitsPlayed || {}).length,
  };
}

/* ---- 업적 판정 ---- */
function evalAchievements(S){
  const sv = load(); let changed = false;
  for (const a of ACHIEVEMENTS){
    if (sv.achievements[a.id]) continue;
    let ok = false; try { ok = a.chk(S); } catch(e){ ok = false; }
    if (ok){ sv.achievements[a.id] = true; changed = true; toast(`업적 달성: ${a.ico} ${a.nm}`, 'gold'); }
  }
  if (changed) save(sv);
}

/* ---- 게임 종료 ---- */
function endGame(){
  let S = buildS(true);
  const ending = ENDINGS.find(e => { try { return e.cond(S); } catch(err){ return false; } }) || ENDINGS[ENDINGS.length - 1];
  S.endingId = ending.id; S.grade = ending.grade;

  // 영구 저장 갱신
  const sv = load();
  sv.gamesPlayed = (sv.gamesPlayed || 0) + 1;
  sv.cityTraitsPlayed[G.city.id] = true;
  sv.mayorTraitsPlayed[G.mayor.id] = true;
  sv.endings[ending.id] = true;
  G.relics.forEach(r => sv.relics[r] = true);
  G.districts.forEach(d => sv.districts[d] = true);
  sv.bestScore = Math.max(sv.bestScore || 0, S.score);
  if (ending.id === 'golden') sv.goldenCount = (sv.goldenCount || 0) + 1;
  save(sv);

  // 갱신된 누적치로 업적 재판정
  S = Object.assign(buildS(true), { endingId:ending.id, grade:ending.grade });
  evalAchievements(S);

  renderResult(S, ending);
  showScreen('screen-result');
}

/* ---- 결과 화면 ---- */
function renderResult(S, ending){
  const sv = load();
  const avgTime = S.total ? (G.stats.totalTime / S.total).toFixed(1) : '0';
  const relicChips = G.relics.map(id => `<span class="chip">${RELIC_MAP[id].ico} ${RELIC_MAP[id].nm}</span>`).join('') || '<span class="chip">없음</span>';
  const distChips = G.districts.map(id => { const d = DISTRICTS.find(x => x.id === id); return `<span class="chip">${d.ico} ${d.nm}</span>`; }).join('') || '<span class="chip">없음</span>';
  const tiles = G.tiles.map(t => `<div class="tile ${t ? 'filled' : ''}">${t ? t.ico : ''}</div>`).join('');
  const totalAch = ACHIEVEMENTS.length, gotAch = Object.keys(sv.achievements).length;

  $('#resultWrap').innerHTML = `
    <div class="ending-hero ${ending.secret ? 'secret' : ''}">
      <div class="grade">${ending.grade}</div>
      <div class="e-nm">${ending.nm}</div>
      <div class="e-ds">${ending.ds}</div>
    </div>

      <div class="stat-cell"><div class="sv">${S.districts}</div><div class="sl">완성 특구</div></div>

      <div class="stat-cell"><div class="sv" style="color:var(--sat)">${S.sat}</div><div class="sl">만족도</div></div>
    </div>

    <div class="chip-row"><span class="chip">🏆 최고 점수 ${sv.bestScore}</span><span class="chip">🏙️ 완성 ${sv.gamesPlayed}회</span>${sv.goldenCount ? `<span class="chip">👑 황금도시 ${sv.goldenCount}회</span>` : ''}</div>

  if (ending.secret) setTimeout(() => goldRain(), 300);
}

/* ===================== UI 헬퍼 ===================== */
function showScreen(id){ $$('.screen').forEach(s => s.classList.toggle('active', s.id === id)); window.scrollTo(0, 0); const el = $('#' + id); if (el) el.scrollTop = 0; }
function setPrompt(title, sub, phase){ $('#turnTitle').textContent = title; $('#turnSub').textContent = sub || ''; $('#turnPrompt .ph').textContent = phase || 'PHASE'; }
function showOverlay(id){ $('#' + id).classList.add('show'); }
function hideOverlay(id){ $('#' + id).classList.remove('show'); }

function flashBudget(kind){ const el = $('#hudBudget'); el.classList.remove('flash-bad', 'flash-good'); void el.offsetWidth; el.classList.add('flash-' + kind); }

function renderHud(){
  $('#hudYear').textContent = G.year;
  $('#hudBudgetVal').textContent = Math.round(G.budget);
  $('#hudProgress').style.width = (G.year / CFG.TOTAL_YEARS * 100) + '%';
  const map = { eco:'Eco', cul:'Cul', grn:'Grn', sat:'Sat' };
  for (const k of INDEX_KEYS){
    const cap = k.charAt(0).toUpperCase() + k.slice(1);
    $('#ix' + cap).textContent = G.idx[k];
    $('#bar' + cap).style.width = G.idx[k] + '%';
  }
  const strip = $('#relicStrip');
  strip.innerHTML = '<span class="lab">유물</span>' +
    (G.relics.length ? G.relics.map(id => `<span class="relic-chip" title="${RELIC_MAP[id].nm}: ${RELIC_MAP[id].ds}">${RELIC_MAP[id].ico}</span>`).join('')
                     : '<span style="color:var(--txt-dim);font-size:12px;">아직 없음</span>');
}

function renderCity(){
  $('#cityCount').textContent = `${G.buildings.length} / ${CFG.GRID} 구역`;
  const grid = $('#cityGrid');
  grid.innerHTML = G.tiles.map((t, i) =>
    `<div class="tile ${t ? 'filled' : ''} ${t && t.fresh ? 'pop' : ''}">${t ? t.ico : ''}</div>`).join('');
  G.tiles.forEach(t => { if (t) t.fresh = false; });
}
function placeTile(ico){ const i = G.tiles.findIndex(t => t === null); if (i >= 0) G.tiles[i] = { ico, fresh:true }; }

function renderSetup(step){
  const box = $('#setupChoices');
  if (step === 'city'){
    $('#setupStep').textContent = 'STEP 1 / 2';
    $('#setupTitle').textContent = '도시의 지형을 고르세요';
    $('#setupDesc').textContent = '지형에 따라 유리한 건물과 전략이 달라집니다.';
    box.innerHTML = setupCityChoices.map((c, i) => choiceHTML(c, i, true)).join('');
    setupCityChoices.forEach((c, i) => box.children[i].onclick = () => chooseCity(c));
  } else {
    $('#setupStep').textContent = 'STEP 2 / 2';
    $('#setupTitle').textContent = '시장을 선택하세요';
    $('#setupDesc').textContent = '시장의 특기가 시작 지수와 운영 방향을 정합니다.';
    box.innerHTML = setupMayorChoices.map((c, i) => choiceHTML(c, i, false)).join('');
    setupMayorChoices.forEach((c, i) => box.children[i].onclick = () => chooseMayor(c));
  }
}
function choiceHTML(c, i, isCity){
  let tags;
  if (isCity) tags = c.fx.map(f => `<span class="tag up">${f}</span>`).join('');
  else tags = c.fx.map(f => `<span class="tag ${f[1]}">${f[0]} ${f[1] === 'up' ? '▲' : '▼'}</span>`).join('');
  return `<button class="choice" style="animation:deal .4s ${i*0.05}s backwards">
    <div class="ico">${c.ico}</div><div class="nm">${c.nm}</div>
    <div class="ds">${c.ds}</div><div class="fx">${tags}</div></button>`;
}

/* ---- 부지 카드 ---- */
function effStars(plot){ const e = clamp(Math.round(plot.sizeFactor * 2.2 - plot.upkeep * 0.12), 1, 5); return '★'.repeat(e) + '☆'.repeat(5 - e); }
function roughGrade(plot){ const v = plot.sizeFactor; return v >= 1.6 ? 'A' : v >= 1.1 ? 'B' : 'C'; }
function renderPlots(){
  const area = $('#cardArea'); area.innerHTML = '';
  G.plots.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'card land'; el.style.animationDelay = (i*0.06) + 's';
    const reconLine = (!p.surveyed && has('recon')) ? `<span class="v">효율 ${roughGrade(p)}급</span>` : '<span class="v hidden">? ? ?</span>';
    const investorLine = (p.surveyed && p.correct && has('investor')) ? ` · 예상이익 높음` : '';
    let stats;
    if (p.surveyed){
      stats = `
        <div class="statline"><span class="k">넓이</span><span class="v">${p.area} ㎡</span></div>
        <div class="statline"><span class="k">둘레(추정)</span><span class="v">${p.peri} m</span></div>
        <div class="statline"><span class="k">유지비/년</span><span class="v">${p.upkeep}</span></div>
        <div class="statline"><span class="k">개발 효율</span><span class="v">${effStars(p)}${investorLine}</span></div>`;
    } else {
      stats = `
        <div class="statline"><span class="k">넓이</span><span class="v hidden">측량 필요</span></div>
        <div class="statline"><span class="k">유지비/년</span><span class="v hidden">측량 필요</span></div>
        <div class="statline"><span class="k">사전 정보</span>${reconLine}</div>`;
    }
    const ctaTxt = p.surveyed ? (p.correct ? '🎯 정밀 개발하기' : '개발하기') : '📐 측량하기';
    el.innerHTML = `
      <div class="ribbon"><span>토지 · ${p.sub}</span><span>${p.kind === 'perimeter' ? '둘레' : p.kind === 'unit' ? '단위' : '넓이'}</span></div>
      <div class="card-body">
        <div class="ttl">${p.name}</div>
        <div class="meta">${p.surveyed ? (p.correct ? '정밀 측량 완료' : '대략 측량됨') : '도면을 보고 측량하세요'}</div>
        <div class="blueprint-slot">${wrapSvg(p.svg)}</div>
        ${stats}
        <button class="card-cta">${ctaTxt}</button>
      </div>`;
    el.querySelector('.card-cta').onclick = () => { if (p.surveyed) chooseToBuild(p); else openSurvey(p); };
    area.appendChild(el);
  });
}

/* ---- 건설 옵션 카드 ---- */
function renderBuildOptions(plot, opts){
  const area = $('#cardArea'); area.innerHTML = '';
  opts.forEach((b, i) => {
    const eff = computeBuild(plot, b), cost = buildCost(b), up = buildUpkeep(plot, b);
    const fxHtml = INDEX_KEYS.filter(k => eff[k]).map(k => {
      const cls = eff[k] < 0 ? 'fx-neg' : 'fx-' + k;
      return `<span class="${cls}">${INDEX_LABEL[k]} ${eff[k] > 0 ? '+' : ''}${eff[k]}</span>`;
    }).join('');
    const afford = G.budget >= cost;
    const el = document.createElement('div');
    el.className = 'card build'; el.style.animationDelay = (i*0.06) + 's';
    el.innerHTML = `
      <div class="ribbon"><span>건물 · ${b.special ? 'SECRET' : 'BUILD'}</span><span>${b.ico}</span></div>
      <div class="card-body">
        <div class="ttl">${b.ico} ${b.nm}</div>
        <div class="meta">건설비 ${cost} · 유지비/년 ${up}</div>
        <div class="fx-mini">${fxHtml}</div>
        <button class="card-cta" ${afford ? '' : 'disabled style="opacity:.45"'}>${afford ? '건설하기' : '예산 부족'}</button>
      </div>`;
    if (afford) el.querySelector('.card-cta').onclick = () => develop(plot, b);
    area.appendChild(el);
  });
}

/* ---- 토스트 & 해금 팝업 ---- */
function toast(msg, type){ const t = document.createElement('div'); t.className = 'toast ' + (type || ''); t.textContent = msg; $('#toasts').appendChild(t); setTimeout(() => t.remove(), 3000); }
let unlockQueue = [], unlockBusy = false;
function queueUnlock(kind, ico, nm, ds){ unlockQueue.push({ kind, ico, nm, ds }); if (!unlockBusy) showNextUnlock(); }
function showNextUnlock(){
  if (unlockQueue.length === 0){ unlockBusy = false; return; }
  unlockBusy = true;
  const u = unlockQueue.shift();
  $('#ukKind').textContent = u.kind; $('#ukIco').textContent = u.ico; $('#ukNm').textContent = u.nm; $('#ukDs').textContent = u.ds;
  $('#unlockPop').classList.add('show');
  setTimeout(() => { $('#unlockPop').classList.remove('show'); setTimeout(showNextUnlock, 350); }, 1700);
}

/* ---- 황금비 연출(숨겨진 엔딩) ---- */
function goldRain(){
  for (let i = 0; i < 40; i++){
    const s = document.createElement('div');
    s.textContent = pick(['✨', '🌟', '👑', '💛']);
    s.style.cssText = `position:fixed;top:-30px;left:${Math.random()*100}vw;font-size:${12+Math.random()*20}px;z-index:95;pointer-events:none;transition:transform 3s linear,opacity 3s;`;
    document.body.appendChild(s);
    requestAnimationFrame(() => { s.style.transform = `translateY(110vh) rotate(${Math.random()*720}deg)`; s.style.opacity = '0'; });
    setTimeout(() => s.remove(), 3200);
  }
}


/* =========================================================================
 *  [6] 도감 / 타이틀 / 안내서 / 초기화
 * ========================================================================= */

const CAT_NAME = Object.fromEntries(BUILDINGS.map(b => [b.cat, b.nm]));
function reqText(d){ return Object.entries(d.req).map(([c, n]) => `${CAT_NAME[c] || c}${n > 1 ? '×' + n : ''}`).join(' + '); }

let codexTab = 'ach';
const CODEX_TABS = [['ach', '업적'], ['end', '엔딩'], ['dist', '특구'], ['relic', '유물']];
function renderCodex(tab){
  codexTab = tab;
  const sv = load();
  $('#codexTabs').innerHTML = CODEX_TABS.map(([id, nm]) =>
    `<button class="codex-tab ${id === tab ? 'active' : ''}" data-tab="${id}">${nm}</button>`).join('');
  $$('#codexTabs .codex-tab').forEach(b => b.onclick = () => renderCodex(b.dataset.tab));

  let items = [], got = 0, totalCount = 0;
  if (tab === 'ach'){
    totalCount = ACHIEVEMENTS.length;
    items = ACHIEVEMENTS.map(a => { const u = !!sv.achievements[a.id]; if (u) got++;
      return codexItem(u, u ? a.ico : '🔒', a.nm, a.ds); });
  } else if (tab === 'end'){
    totalCount = ENDINGS.length;
    items = ENDINGS.map(e => { const u = !!sv.endings[e.id]; if (u) got++;
      if (!u && e.secret) return codexItem(false, '❓', '??? (숨겨진 엔딩)', '특별한 조건을 모두 만족하면 나타납니다.');
      return codexItem(u, u ? e.grade : '🔒', u ? e.nm : '???', u ? e.ds : '아직 보지 못한 엔딩입니다.'); });
  } else if (tab === 'dist'){
    totalCount = DISTRICTS.length;
    items = DISTRICTS.map(d => { const u = !!sv.districts[d.id]; if (u) got++;
      return codexItem(u, u ? d.ico : '🔒', u ? d.nm : '???', `필요 건물: ${reqText(d)}` + (u ? `\n${d.ds}` : '')); });
  } else {
    totalCount = RELICS.length;
    items = RELICS.map(r => { const u = !!sv.relics[r.id]; if (u) got++;
      return codexItem(u, u ? r.ico : '🔒', u ? r.nm : '???', u ? r.ds : '아직 발굴하지 못한 유물입니다.'); });
  }
  $('#codexProgress').textContent = `수집 ${got} / ${totalCount}`;
  $('#codexList').innerHTML = items.join('');
}
function codexItem(unlocked, ico, nm, ds){
  return `<div class="codex-item ${unlocked ? '' : 'locked'}">
    <div class="ci-ico">${ico}</div>
    <div><div class="ci-nm">${nm}</div><div class="ci-ds">${(ds || '').replace(/\n/g, '<br>')}</div></div>
  </div>`;
}

/* ---- 타이틀 하단 평생 통계 ---- */
function renderLifeStats(){
  const sv = load();
  const ach = Object.keys(sv.achievements).length;
  $('#lifeStats').innerHTML = `
    <div class="life-stat"><b>${sv.gamesPlayed || 0}</b><span>완성한 도시</span></div>

    <div class="life-stat"><b>${sv.goldenCount || 0}</b><span>황금도시</span></div>`;
}

/* ---- 초기화 & 이벤트 바인딩 ---- */
function init(){
  buildTitleBlueprint();
  renderLifeStats();
  $('#cityGrid').innerHTML = new Array(CFG.GRID).fill('<div class="tile"></div>').join('');

  $('#btnStart').onclick = startNewGame;

  $('#calcInput').addEventListener('keydown', e => { if (e.key === 'Enter') $('#calcSubmit').click(); });

}
document.addEventListener('DOMContentLoaded', init);
